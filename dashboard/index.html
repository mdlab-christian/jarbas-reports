<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>🦞 JARBAS Mission Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f0d0b; --bg2:#1b1814; --bg3:#231f1a; --bg4:#2c2820;
  --primary:#34d399; --pm:rgba(52,211,153,.12); --pb:rgba(52,211,153,.25);
  --fg1:#f5f0e8; --fg2:#c4b89a; --fg3:#877060;
  --border:#2e2820; --border2:#3d3528;
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg1);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.page{max-width:1000px;margin:0 auto;padding:32px 20px 60px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header h1{font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;display:flex;align-items:center;gap:10px}
.last-update{font-size:12px;color:var(--fg3);font-family:'JetBrains Mono',monospace}

/* Semáforo */
.semaforo-bar{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px}
.semaforo-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;animation:pulse 2s ease-in-out infinite}
.semaforo-dot.green{background:var(--green);box-shadow:0 0 12px rgba(74,222,128,.5)}
.semaforo-dot.yellow{background:var(--yellow);box-shadow:0 0 12px rgba(251,191,36,.5)}
.semaforo-dot.red{background:var(--red);box-shadow:0 0 12px rgba(248,113,113,.6)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.9)}}
.semaforo-text{font-size:16px;font-weight:700;font-family:'Manrope',sans-serif}
.semaforo-sub{font-size:12px;color:var(--fg3);margin-left:auto}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.kpi-label{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.kpi-value{font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:var(--fg2)}
.kpi.warn .kpi-value{color:var(--yellow)}
.kpi.crit .kpi-value{color:var(--red)}
.kpi.ok .kpi-value{color:var(--green)}

/* RAM bar */
.ram-bar{height:6px;background:var(--bg4);border-radius:3px;margin-top:8px;overflow:hidden}
.ram-fill{height:100%;border-radius:3px;transition:width .5s ease}
.ram-fill.green-fill{background:linear-gradient(90deg,var(--primary),#40e8aa)}
.ram-fill.yellow-fill{background:linear-gradient(90deg,var(--yellow),#fde68a)}
.ram-fill.red-fill{background:linear-gradient(90deg,var(--red),#fca5a5)}

/* Missões */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--primary);margin-bottom:10px}
.missoes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.missao-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.missao-rota{font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;color:var(--primary)}
.missao-etapa{font-size:12px;color:var(--fg2);margin-top:2px}
.missao-fase{font-size:10px;font-weight:700;background:var(--pm);color:var(--primary);border:1px solid var(--pb);padding:2px 8px;border-radius:12px;margin-left:auto;flex-shrink:0}
.empty-state{text-align:center;padding:32px;color:var(--fg3);font-size:13px;background:var(--bg2);border:1px dashed var(--border2);border-radius:12px}

/* Fila */
.fila-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.fila-item{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--fg2)}

/* Custo */
.custo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.custo-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.custo-label{font-size:11px;color:var(--fg3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
.custo-valor{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--fg1)}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--fg3)}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;margin-top:40px;font-size:11px;color:var(--fg3)}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--pm);border:1px solid var(--pb);color:var(--primary);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 1.5s infinite}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>🦞 JARBAS <span style="color:var(--primary)">Mission Control</span></h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="live-badge"><span class="live-dot"></span> AO VIVO</span>
      <span class="last-update" id="last-update">atualizando...</span>
    </div>
  </div>

  <div id="app">
    <div class="loading"><div class="spinner"></div>Conectando ao JARBAS...</div>
  </div>

  <div class="footer">
    🦞 JARBAS Mission Control · Atualiza a cada 30s · MDX LegalTech<br>
    <a href="../" style="color:var(--fg3);text-decoration:none;margin-top:4px;display:inline-block">← Todos os relatórios</a>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://qdivfairxhdihaqqypgb.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkaXZmYWlyeGhkaWhhcXF5cGdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNzM3MDgsImV4cCI6MjA4NjY0OTcwOH0.ywCqiC3QEbz5hOJOOHb_MhTGDGWS5wLHPcOmG_vxUHs';

function fmt(n) { return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n); }

async function fetchData() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/jarbas_mission_control?node_id=eq.mac-mini-01&limit=1`,
    { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data[0] || null;
}

function ramColor(pct) {
  if (pct >= 88) return 'red';
  if (pct >= 75) return 'yellow';
  return 'green';
}
function ramClass(pct) {
  if (pct >= 88) return 'crit';
  if (pct >= 75) return 'warn';
  return 'ok';
}
function semLabel(s) {
  if (s === 'green')  return { text: '🟢 Pode mandar mais tarefas', sub: 'Carga normal' };
  if (s === 'yellow') return { text: '🟡 Carga elevada — 1 por vez', sub: 'Memória ou Claude acima do normal' };
  if (s === 'red')    return { text: '🔴 Sobrecarregado — aguarde', sub: 'Finalize tarefas antes de enviar mais' };
  return { text: '⚪ Aguardando dados', sub: '' };
}

function render(d) {
  if (!d) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state" style="padding:48px">
        ⚠️ Sem dados do JARBAS ainda.<br><br>
        <span style="font-size:12px">Aguardando o Mac Mini enviar o primeiro heartbeat...<br>
        A tabela <code>jarbas_mission_control</code> precisa ser criada no Supabase.</span>
      </div>`;
    return;
  }

  const sl = semLabel(d.semaforo || 'green');
  const rc = ramColor(d.ram_pct || 0);
  const rClass = ramClass(d.ram_pct || 0);
  const missoes = d.missoes || [];
  const fila = d.fila || [];
  const ago = d.updated_at
    ? `${Math.round((Date.now() - new Date(d.updated_at)) / 1000)}s atrás`
    : '—';

  document.getElementById('last-update').textContent = `Atualizado ${ago}`;

  document.getElementById('app').innerHTML = `
    <div class="semaforo-bar">
      <div class="semaforo-dot ${d.semaforo || 'green'}"></div>
      <div>
        <div class="semaforo-text">${sl.text}</div>
        <div style="font-size:12px;color:var(--fg3);margin-top:2px">${sl.sub}</div>
      </div>
      <div class="semaforo-sub">Node: mac-mini-01 · ${ago}</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi ${rClass}">
        <div class="kpi-label">RAM usada</div>
        <div class="kpi-value">${d.ram_pct || 0}%</div>
        <div class="kpi-sub">${d.ram_used_gb || 0}GB / ${d.ram_total_gb || 16}GB · ${d.ram_free_gb || 0}GB livre</div>
        <div class="ram-bar"><div class="ram-fill ${rc}-fill" style="width:${d.ram_pct || 0}%"></div></div>
      </div>
      <div class="kpi ${d.claude_procs >= 5 ? 'crit' : d.claude_procs >= 3 ? 'warn' : 'ok'}">
        <div class="kpi-label">Processos Claude</div>
        <div class="kpi-value">${d.claude_procs || 0}</div>
        <div class="kpi-sub">${d.whisper_procs || 0} Whisper · ${d.cpu_pct || 0}% CPU total</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Custo hoje</div>
        <div class="kpi-value" style="font-size:22px;color:${(d.custo_hoje||0) > 1000 ? 'var(--red)' : (d.custo_hoje||0) > 500 ? 'var(--yellow)' : 'var(--fg1)'}">R$${fmt(d.custo_hoje || 0)}</div>
        <div class="kpi-sub">Mês: R$${fmt(d.custo_mes || 0)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Missões ativas</div>
        <div class="kpi-value" style="color:var(--primary)">${missoes.length}</div>
        <div class="kpi-sub">${fila.length} na fila</div>
      </div>
    </div>

    <div class="section-title">🚀 Missões ativas</div>
    <div class="missoes-list">
      ${missoes.length === 0
        ? `<div class="empty-state">Nenhuma lapidação em andamento</div>`
        : missoes.map(m => `
          <div class="missao-item">
            <div>
              <div class="missao-rota">${m.rota}</div>
              <div class="missao-etapa">${m.etapa || 'em andamento'} · ${(m.cprompts_concluidos||[]).length} C-prompts concluídos</div>
            </div>
            <div class="missao-fase">Fase ${m.fase || 1}</div>
          </div>`).join('')}
    </div>

    ${fila.length > 0 ? `
    <div class="section-title">📋 Fila</div>
    <div class="fila-list">
      ${fila.map(f => `<div class="fila-item">⏳ ${f}</div>`).join('')}
    </div>` : ''}

    <div class="section-title">💰 Custos</div>
    <div class="custo-grid">
      <div class="custo-card">
        <div class="custo-label">Hoje</div>
        <div class="custo-valor">R$ ${fmt(d.custo_hoje || 0)}</div>
      </div>
      <div class="custo-card">
        <div class="custo-label">Mês de março</div>
        <div class="custo-valor">R$ ${fmt(d.custo_mes || 0)}</div>
      </div>
    </div>
  `;
}

async function refresh() {
  try {
    const d = await fetchData();
    render(d);
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state" style="color:var(--red)">
        ❌ Erro ao carregar dados: ${e.message}<br>
        <span style="font-size:12px;color:var(--fg3)">Verificando em 30s...</span>
      </div>`;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
