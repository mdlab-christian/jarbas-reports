<style>
:root {
  --bg: #12100e;
  --surface: #1a1714;
  --card: #201d1a;
  --card2: #252119;
  --border: #2e2b27;

  --primary-border: rgba(32,201,151,0.3);
  --warn: #f59e0b;
  --warn-dim: rgba(245,158,11,0.12);
  --danger: #ef4444;
  --success: #22c55e;
  --info: #60a5fa;
  --purple: #a78bfa;
  --teal: #2dd4bf;
  --orange: #fb923c;
  --text: #f5f0eb;
  --muted: #9e9890;
  --mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.6;display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:1.25rem 0;z-index:30;flex-shrink:0}
.sidebar-logo{padding:0 1rem 1rem;border-bottom:1px solid var(--border);margin-bottom:0.75rem}
.sidebar-logo h2{font-family:Manrope,sans-serif;font-size:15px;font-weight:700;color:var(--primary)}
.sidebar-logo p{font-size:11px;color:var(--muted);margin-top:2px}
.nav-wave{padding:0.25rem 0}
.nav-wave-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:0.5rem 1rem 0.25rem;display:flex;align-items:center;gap:6px}
.nav-wave-label .wave-num{background:var(--primary-dim);color:var(--primary);border-radius:4px;padding:1px 6px;font-size:9px;font-family:var(--mono)}
.nav-link{display:flex;align-items:center;gap:8px;padding:0.3rem 1rem;font-size:12px;color:var(--muted);text-decoration:none;transition:all .15s;cursor:pointer;border-left:2px solid transparent}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--primary-dim);border-left-color:var(--primary)}
.nav-link .task-id{font-family:var(--mono);font-size:10px;color:var(--primary);opacity:.8}
.nav-divider{height:1px;background:var(--border);margin:0.5rem 0}
/* MAIN */
.main{margin-left:220px;flex:1;padding:2rem;max-width:1100px}
/* HEADER */
.page-header{margin-bottom:2.5rem}
.page-header h1{font-family:Manrope,sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.page-header h1 span{color:var(--primary)}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:0.75rem}
.meta-chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--muted)}
.meta-chip b{color:var(--text)}
/* LEGEND */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2rem;padding:0.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* WAVE SECTION */
.wave-section{margin-bottom:2.5rem;scroll-margin-top:2rem}
.wave-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
.wave-badge{background:var(--primary);color:#000;font-family:Manrope,sans-serif;font-weight:700;font-size:12px;padding:3px 10px;border-radius:4px}
.wave-title{font-family:Manrope,sans-serif;font-size:16px;font-weight:700}
.wave-meta{font-size:11px;color:var(--muted);margin-left:auto;display:flex;gap:10px;align-items:center}
.wave-parallel{background:var(--primary-dim);color:var(--primary);border:1px solid var(--primary-border);padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono)}
.wave-seq{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(245,158,11,.3);padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono)}
.tasks-grid{display:flex;flex-direction:column;gap:10px}
/* TASK CARD */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.task-card:hover{border-color:var(--primary-border)}
.task-header{padding:0.85rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer}
.task-id-badge{font-family:var(--mono);font-size:11px;font-weight:500;background:var(--primary-dim);color:var(--primary);border:1px solid var(--primary-border);border-radius:4px;padding:2px 8px;flex-shrink:0}
.task-title{font-weight:500;flex:1;font-size:13px}
.task-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-infra{background:rgba(245,158,11,.15);color:var(--warn)}
.badge-soul{background:rgba(167,139,250,.15);color:var(--purple)}
.badge-capabilities{background:rgba(34,197,94,.15);color:var(--success)}
.badge-integration{background:rgba(45,212,191,.15);color:var(--teal)}
.badge-docs{background:rgba(96,165,250,.15);color:var(--info)}
.badge-tests{background:rgba(251,146,60,.15);color:var(--orange)}
.complexity-S{background:rgba(34,197,94,.1);color:var(--success);border:1px solid rgba(34,197,94,.2)}
.complexity-M{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.complexity-L{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.time-chip{font-size:10px;color:var(--muted);font-family:var(--mono)}
.btn-group{display:flex;gap:6px;flex-shrink:0}
.btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid;cursor:pointer;transition:all .15s;font-family:Inter,sans-serif}
.btn-plan{background:rgba(96,165,250,.1);color:var(--info);border-color:rgba(96,165,250,.25)}
.btn-plan:hover{background:rgba(96,165,250,.2)}
.btn-plan.active{background:rgba(96,165,250,.25);border-color:var(--info)}
.btn-exec{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border)}
.btn-exec:hover{background:rgba(32,201,151,.2)}
.btn-exec.active{background:rgba(32,201,151,.25);border-color:var(--primary)}

.task-body{border-top:1px solid var(--border);display:none}
.task-body.open{display:block}
.task-section{padding:0.85rem 1rem;border-bottom:1px solid var(--border)}
.task-section:last-child{border-bottom:none}
.task-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:0.5rem}
.deps-row{display:flex;gap:6px;flex-wrap:wrap}
.dep-chip{font-family:var(--mono);font-size:10px;background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;color:var(--muted)}
.docs-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.docs-list li{font-size:12px;color:var(--muted);padding:3px 8px;background:var(--card2);border-radius:4px;font-family:var(--mono);display:flex;align-items:flex-start;gap:6px}
.docs-list li::before{content:"📖";flex-shrink:0;font-size:11px}
.prompt-container{position:relative}
.prompt-code{background:#0e0c0a;border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:var(--mono);font-size:11px;line-height:1.7;color:#d4cfca;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s}
.copy-btn:hover{background:var(--primary-dim);color:var(--primary);border-color:var(--primary-border)}
.copy-btn.copied{background:rgba(34,197,94,.15);color:var(--success);border-color:rgba(34,197,94,.3)}
/* PROGRESS TRACKER */
.progress-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:2rem}
.progress-bar-wrap h3{font-family:Manrope,sans-serif;font-size:13px;font-weight:600;margin-bottom:0.5rem}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:0.5rem}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;width:0%}
.progress-stats{display:flex;gap:1rem;font-size:11px;color:var(--muted)}
.progress-stats b{color:var(--primary)}
/* CHECKBOX on card */
.task-done-toggle{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-done-toggle.done{background:var(--primary);border-color:var(--primary)}
.task-done-toggle.done::after{content:'✓';color:#000;font-size:10px;font-weight:700}
.task-card.done-card{opacity:.5}
.task-card.done-card .task-id-badge{background:rgba(34,197,94,.1);color:var(--success);border-color:rgba(34,197,94,.2)}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────
const state = {};
TASKS.forEach(t => state[t.id] = {done:false, planOpen:false, execOpen:false});

function updateProgress(){
  const done = Object.values(state).filter(s=>s.done).length;
  const pct = Math.round((done/TASKS.length)*100);
  document.getElementById('done-count').textContent = done;
  document.getElementById('pct-text').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
}

function toggleDone(id){
  state[id].done = !state[id].done;
  const card = document.getElementById('card-'+id);
  card.classList.toggle('done-card', state[id].done);
  const tog = document.getElementById('tog-'+id);
  tog.classList.toggle('done', state[id].done);
  updateProgress();
  localStorage.setItem('mdos-executor', JSON.stringify(
    Object.fromEntries(Object.entries(state).map(([k,v])=>[k,v.done]))
  ));
}

function toggleSection(id, section){
  const other = section === 'plan' ? 'exec' : 'plan';
  if(state[id][section+'Open'] && !state[id][other+'Open']){
    state[id][section+'Open'] = false;
  } else {
    state[id][section+'Open'] = !state[id][section+'Open'];
  }
  renderTaskBody(id);
  const planBtn = document.getElementById('btn-plan-'+id);
  const execBtn = document.getElementById('btn-exec-'+id);
  planBtn.classList.toggle('active', state[id].planOpen);
  execBtn.classList.toggle('active', state[id].execOpen);
}

function renderTaskBody(id){
  const task = TASKS.find(t=>t.id===id);
  const body = document.getElementById('body-'+id);
  const isOpen = state[id].planOpen || state[id].execOpen;
  body.className = 'task-body' + (isOpen ? ' open' : '');
  let html = '';
  // deps + parallel
  if(task.depends_on.length || task.parallel_with.length){
    html += '<div class="task-section"><div class="task-section-label">Relações</div><div class="deps-row">';
    if(task.depends_on.length){
      html += '<span style="font-size:10px;color:var(--danger);margin-right:4px">DEPENDE DE:</span>';
      task.depends_on.forEach(d => html += `<span class="dep-chip" style="color:var(--danger)">${d}</span>`);
    }
    if(task.parallel_with.length){
      html += '<span style="font-size:10px;color:var(--primary);margin-left:8px;margin-right:4px">PARALELO COM:</span>';
      task.parallel_with.forEach(d => html += `<span class="dep-chip" style="color:var(--primary)">${d}</span>`);
    }
    html += '</div></div>';
  }
  if(state[id].planOpen){
    html += '<div class="task-section"><div class="task-section-label">📖 Documentos para ler antes</div><ul class="docs-list">';
    task.docs_to_read.forEach(d => html += `<li>${escHtml(d)}</li>`);
    html += '</ul></div>';
  }
  if(state[id].execOpen){
    html += `<div class="task-section"><div class="task-section-label">▶️ Prompt para o terminal Claude Code</div>
    <div class="prompt-container">
      <div class="prompt-code">${escHtml(task.prompt)}</div>
      <button class="copy-btn" onclick="copyPrompt('${id}')">📋 Copiar</button>
    </div></div>`;
  }
  body.innerHTML = html;
}

function copyPrompt(id){
  const task = TASKS.find(t=>t.id===id);
  navigator.clipboard.writeText(task.prompt).then(()=>{
    const btn = document.querySelector(`#body-${id} .copy-btn`);
    if(btn){btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 Copiar';btn.classList.remove('copied')},2000);}
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const container = document.getElementById('waves-container');
  const nav = document.getElementById('sidebar-nav');
  let navHTML = '';
  let mainHTML = '';

  WAVES.forEach(wv => {
    const tasks = TASKS.filter(t=>t.w===undefined ? t.wave===wv.w : t.wave===wv.w);
    if(!tasks.length) return;

    navHTML += `<div class="nav-wave">
      <div class="nav-wave-label"><span class="wave-num">W${wv.w}</span>${wv.title}</div>
      ${tasks.map(t=>`<a class="nav-link" href="#wave-${wv.w}-${t.id}"><span class="task-id">${t.id}</span>${t.title.substring(0,28)}${t.title.length>28?'…':''}</a>`).join('')}
    </div><div class="nav-divider"></div>`;

    mainHTML += `<section class="wave-section" id="wave-${wv.w}">
      <div class="wave-header">
        <span class="wave-badge">W${wv.w}</span>
        <span class="wave-title">${wv.title}</span>
        <div class="wave-meta">
          <span style="font-size:11px;color:var(--muted)">${wv.subtitle}</span>
          <span class="${wv.type==='parallel'?'wave-parallel':'wave-seq'}">${wv.type==='parallel'?`⚡ ${wv.terminals} em paralelo`:'🔁 sequencial'}</span>
        </div>
      </div>
      <div class="tasks-grid">
        ${tasks.map(t => renderTaskCard(t)).join('')}
      </div>
    </section>`;
  });

  nav.innerHTML = navHTML;
  container.innerHTML = mainHTML;
}

function renderTaskCard(task){
  const cat = CAT[task.category] || {cls:'badge-docs',label:task.category};
  return `<div class="task-card" id="card-${task.id}" scrollId="wave-${task.wave}-${task.id}">
    <div class="task-header">
      <div class="task-done-toggle" id="tog-${task.id}" onclick="toggleDone('${task.id}')" title="Marcar como concluída"></div>
      <span class="task-id-badge" id="anchor-${task.id}">${task.id}</span>
      <span class="task-title">${escHtml(task.title)}</span>
      <div class="task-badges">
        <span class="badge ${cat.cls}">${cat.label}</span>
        <span class="badge complexity-${task.complexity}">${task.complexity}</span>
        <span class="time-chip">${task.estimated_minutes}min</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-plan" id="btn-plan-${task.id}" onclick="toggleSection('${task.id}','plan')">📋 Plan</button>
        <button class="btn btn-exec" id="btn-exec-${task.id}" onclick="toggleSection('${task.id}','exec')">▶️ Execute</button>
      </div>
    </div>
    <div class="task-body" id="body-${task.id}"></div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────
render();
updateProgress();

// Restore done state
try{
  const saved = JSON.parse(localStorage.getItem('mdos-executor')||'{}');
  Object.entries(saved).forEach(([id,done])=>{
    if(done && state[id]){
      state[id].done = true;
      document.getElementById('card-'+id)?.classList.add('done-card');
      document.getElementById('tog-'+id)?.classList.add('done');
    }
  });
  updateProgress();
}catch(e){}
</script>
</body>
</html>
