  {n:1, name:'Identidade MIA', tasks:['M01','M08','M09','M10','M11','M12'], mode:'parallel', desc:'Infra base + todos os arquivos de identidade em paralelo'},
  {n:2, name:'Instalar OpenClaw', tasks:['M02','M03'], mode:'parallel', desc:'Instalar ferramentas + criar workspace (requer M01)'},
  {n:3, name:'Configurar', tasks:['M04','M05'], mode:'parallel', desc:'openclaw.json + .env em paralelo (requer M03)'},
  {n:4, name:'LaunchAgent', tasks:['M06','M07'], mode:'sequential', desc:'Criar plist → ativar daemon (M07 requer M06+M08+M09+M10)'},

  {n:7, name:'Finalização', tasks:['F03','M20'], mode:'parallel', desc:'Testes básicos + documentação final'}
];

const taskMap = {};
TASKS.forEach(t => taskMap[t.id] = t);

let completed = JSON.parse(localStorage.getItem('mdos-v4-completed') || '{}');

function saveCompleted() {
  localStorage.setItem('mdos-v4-completed', JSON.stringify(completed));
}

function updateProgress() {
  const total = TASKS.length;
  const done = Object.values(completed).filter(Boolean).length;
  document.getElementById('progress-count').textContent = done + ' / ' + total;
  document.getElementById('bar-fill').style.width = Math.round(done/total*100) + '%';
  // Update sidebar
  WAVE_INFO.forEach(w => {
    const el = document.getElementById('wave-prog-' + w.n);
    if (el) {
      const waveDone = w.tasks.filter(id => completed[id]).length;
      el.textContent = waveDone + '/' + w.tasks.length;
    }
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  });
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  WAVE_INFO.forEach(w => {
    const a = document.createElement('a');
    a.href = '#wave-' + w.n;
    a.className = 'sidebar-wave';
    a.innerHTML = '<span class="wave-num">W' + w.n + '</span> ' + w.name +
      '<span class="wave-prog" id="wave-prog-' + w.n + '">0/' + w.tasks.length + '</span>';
    nav.appendChild(a);
  });
}

function buildMain() {
  const main = document.getElementById('main-content');
  WAVE_INFO.forEach(w => {
    const section = document.createElement('div');
    section.className = 'wave-section';
    section.id = 'wave-' + w.n;

    const modeClass = w.mode === 'parallel' ? 'parallel' : 'sequential';
    const modeLabel = w.mode === 'parallel' ? '⚡ paralelo' : '↓ sequencial';
    const totalMin = w.tasks.reduce((s, id) => s + (taskMap[id]?.min || 0), 0);

    section.innerHTML = '<div class="wave-header">' +
      '<div class="wave-title">Onda ' + w.n + ' — ' + w.name + '</div>' +
      '<div class="wave-mode ' + modeClass + '">' + modeLabel + '</div>' +
      '<div style="margin-left:auto;font-size:12px;color:var(--muted)">~' + totalMin + 'min · ' + w.tasks.length + ' tasks</div>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:1rem">' + w.desc + '</div>';

    w.tasks.forEach(tid => {
      const t = taskMap[tid];
      if (!t) return;
      section.appendChild(buildTaskCard(t));
    });

    main.appendChild(section);
  });
}

function buildTaskCard(t) {
  const card = document.createElement('div');
  card.className = 'task-card cat-' + t.cat;
  card.id = 'task-' + t.id;

  const depsHtml = t.deps.length ? t.deps.map(d => '<span class="dep-chip">' + d + '</span>').join(' ') : '';

  card.innerHTML =
    '<div class="task-header">' +
      '<span class="task-id">' + t.id + '</span>' +
      '<div style="flex:1">' +
        '<div class="task-title">' + t.title + '</div>' +
        '<div class="task-meta">' +
          '<span class="badge badge-cat">' + t.cat + '</span>' +
          '<span class="badge badge-' + t.cx.toLowerCase() + '">' + t.cx + '</span>' +
          '<span class="badge-time">~' + t.min + 'min</span>' +
          (t.deps.length ? '<span style="font-size:10px;color:var(--muted);margin-left:4px">dep:</span>' + depsHtml : '') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="task-actions">' +
      '<button class="btn-plan" onclick="togglePrompt(\'' + t.id + '\',\'plan\',this)">📋 PLAN</button>' +
      '<button class="btn-exec" onclick="togglePrompt(\'' + t.id + '\',\'exec\',this)">▶️ EXECUTE</button>' +
      '<label class="task-done">' +
        '<input type="checkbox" ' + (completed[t.id] ? 'checked' : '') + ' onchange="markDone(\'' + t.id + '\',this.checked)"> Concluído' +
      '</label>' +
    '</div>' +
    '<div class="prompt-box plan-box" id="plan-' + t.id + '">' +
      '<div class="prompt-box-inner">' +
        '<div class="prompt-label plan-label">📋 PLAN PROMPT <button class="btn-copy" onclick="copyText(TASKS.find(x=>x.id===\'' + t.id + '\').plan,this)">📋 Copiar</button></div>' +
        '<pre class="prompt-content">' + escapeHtml(t.plan) + '</pre>' +
      '</div>' +
    '</div>' +
    '<div class="prompt-box exec-box" id="exec-' + t.id + '">' +
      '<div class="prompt-box-inner">' +
        '<div class="prompt-label exec-label">▶️ EXECUTE PROMPT <button class="btn-copy" onclick="copyText(TASKS.find(x=>x.id===\'' + t.id + '\').exec,this)">📋 Copiar</button></div>' +
        '<pre class="prompt-content">' + escapeHtml(t.exec) + '</pre>' +
      '</div>' +
    '</div>';

  return card;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function togglePrompt(id, type, btn) {
  const box = document.getElementById(type + '-' + id);
  const isVisible = box.classList.contains('visible');
  // Hide all boxes in same card
  const card = document.getElementById('task-' + id);
  card.querySelectorAll('.prompt-box').forEach(b => b.classList.remove('visible'));
  card.querySelectorAll('.btn-plan,.btn-exec').forEach(b => b.classList.remove('active'));
  if (!isVisible) {
    box.classList.add('visible');
    btn.classList.add('active');
    box.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function markDone(id, done) {
  completed[id] = done;
  saveCompleted();
  updateProgress();
  const card = document.getElementById('task-' + id);
  if (card) {
    card.style.opacity = done ? '.6' : '1';
  }
}

buildSidebar();
