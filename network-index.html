<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARBAS Network — Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, sans-serif; background: #080810; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 700px; padding: 40px 20px; text-align: center; }
  h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 48px; font-size: 15px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #0e0e1c; border: 1px solid #1e1e2e; border-radius: 16px; padding: 28px; text-decoration: none; color: inherit; transition: border-color 0.2s; }
  .card:hover { border-color: #4a4a8a; }
  .card.jarbas { border-top: 3px solid #74b9ff; }
  .card.jana { border-top: 3px solid #fdcb6e; }
  .card .emoji { font-size: 36px; margin-bottom: 12px; }
  .card h2 { font-size: 20px; margin-bottom: 6px; }
  .card p { color: #666; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <h1>🌐 JARBAS Network</h1>
  <div class="subtitle">Mac Mini M4 + MacBook Air M4 · MdLab · 2026</div>
  <div class="grid">
    <a href="./jarbas/" class="card jarbas">
      <div class="emoji">🦞</div>
      <h2>JARBAS</h2>
      <p>Mac Mini M4<br>Operação jurídica · Gustavo</p>
    </a>
    <a href="./jana/" class="card jana">
      <div class="emoji">🌸</div>
      <h2>JANA</h2>
      <p>MacBook Air M4<br>Desenvolvimento · Christian</p>
    </a>
  </div>
</div>
</body>
</html>
